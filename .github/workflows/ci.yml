name: Workflow-CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLproject/JobDataset_preprocessing/job_dataset_preprocessed.csv"
  MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/mlruns"
  EXPERIMENT_NAME: "Job_Salary_Classification_Local"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Set up job (Otomatis diinisialisasi oleh GitHub Runner)

      # 2. Run actions/checkout@v3
      # Menggunakan v3 sesuai dengan visualisasi log langkah kerja pada gambar 3
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # 3. Set up Python 3.12.7
      # Menggunakan Python 3.12.7 sesuai instruksi visual log gambar 3
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # 4. Check Env
      - name: Check Env
        run: |
          echo "Data path URL: $CSV_URL"
          echo "Tracking URI: $MLFLOW_TRACKING_URI"

      # 5. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn numpy matplotlib seaborn

      # 6. Run mlflow project
      # Mengarah ke folder MLProject sesuai nama folder pada gambar 1
      - name: Run mlflow project
        run: |
          mlflow run ${{ github.workspace }}/MLproject --env-manager=local --experiment-name "${{ env.EXPERIMENT_NAME }}"

      # 7. Get latest MLflow run_id
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(python - <<'PY'
          import mlflow

          mlflow.set_tracking_uri("${{ env.MLFLOW_TRACKING_URI }}")
          experiment = mlflow.get_experiment_by_name("${{ env.EXPERIMENT_NAME }}")
          if experiment is None:
              raise SystemExit("Experiment not found")

          runs = mlflow.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=["attributes.start_time DESC"],
              max_results=1,
          )
          if runs.empty:
              raise SystemExit("No MLflow runs found")

          print(runs.iloc[0]["run_id"])
          PY
          )
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      # 8. Install Python dependencies
      - name: Install Python dependencies
        run: |
          pip install mlflow

      # 9. Upload to GitHub (Metode penyimpanan repositori yang sama sesuai petunjuk Gambar 3)
      - name: Upload to GitHub
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          
          # Memastikan file pelacakan mlruns ikut terunggah
          git add mlruns/ || echo "No mlruns directory found"
          git commit -m "Add MLflow execution artifacts from CI pipeline [skip ci]" || echo "No changes to commit"
          git push origin main || echo "No changes to push"

      # 10. Build Docker Model
      # Menggunakan mlflow models build-docker untuk membuat citra docker aplikasi prediction Anda
      - name: Build Docker Model
        run: |
          mlflow models build-docker --model-uri "file://${{ github.workspace }}/mlruns/0/$RUN_ID/artifacts/model" --name "salary-prediction-model"

      # 11. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          logout: true

      # 12. Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag salary-prediction-model ${{ secrets.DOCKER_HUB_USERNAME }}/salary-prediction-model:latest

      # 13. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/salary-prediction-model:latest

      # 14. Post Log in to Docker Hub (Otomatis dijalankan oleh GitHub Actions)
      # 15. Post Set up Python 3.12.7 (Otomatis dijalankan oleh GitHub Actions)
      # 16. Post Run actions/checkout@v3 (Otomatis dijalankan oleh GitHub Actions)
      # 17. Complete job (Otomatis dijalankan oleh GitHub Actions)
