name: Workflow-CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Perbaikan case-sensitivity folder: MLProject (P kapital)
  CSV_URL: "MLProject/JobDataset_preprocessing/job_dataset_preprocessed.csv"
  MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/mlruns"
  MLFLOW_EXPERIMENT_NAME: "Job_Salary_Classification_Local"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Run actions/checkout@v3
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      # 2. Set up Python 3.12.7
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # 3. Check Env
      - name: Check Env
        run: |
          echo "Data path URL: $CSV_URL"
          echo "Tracking URI: $MLFLOW_TRACKING_URI"

      # 4. Install dependencies (Termasuk conda jika mlflow run membutuhkannya, atau pasang via pip)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn numpy matplotlib seaborn

      # 5. Run mlflow project
      # Menghapus 'conda activate' manual karena mlflow run otomatis mengisolasi env berdasarkan conda.yaml
      - name: Run MLflow Project
        working-directory: MLProject
        shell: bash -l {0}
        run: |
          mlflow run . --no-conda --param-list data_path="JobDataset_preprocessing/job_dataset_preprocessed.csv"

      # 6. Get latest MLflow run_id
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(python - <<'PY'
          import mlflow
          import os

          mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])
          experiment = mlflow.get_experiment_by_name(os.environ["MLFLOW_EXPERIMENT_NAME"])
          if experiment is None:
              raise SystemExit("Experiment not found")

          runs = mlflow.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=["attributes.start_time DESC"],
              max_results=1,
          )
          if runs.empty:
              raise SystemExit("No MLflow runs found")

          print(runs.iloc[0]["run_id"])
          PY
          )
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      # 7. Upload to GitHub
      - name: Upload to GitHub
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          
          git add mlruns/ || echo "No mlruns directory found"
          git commit -m "Add MLflow execution artifacts from CI pipeline [skip ci]" || echo "No changes to commit"
          git push origin main || echo "No changes to push"

      # 8. Build Docker Model
      # Memastikan pencarian path experiment id disesuaikan (default: 0 atau id dinamis dari MLflow)
      - name: Build Docker Model
        run: |
          mlflow models build-docker --model-uri "mlruns/0/$RUN_ID/artifacts/model" --name "salary-prediction-model"

      # 9. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          logout: true

      # 10. Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag salary-prediction-model ${{ secrets.DOCKER_HUB_USERNAME }}/salary-prediction-model:latest

      # 11. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/salary-prediction-model:latest
