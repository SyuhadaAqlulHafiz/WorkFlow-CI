name: Workflow-CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLProject/JobDataset_preprocessing/job_dataset_preprocessed.csv"
  MLFLOW_TRACKING_URI: "file://${{ github.workspace }}/mlruns"
  MLFLOW_EXPERIMENT_NAME: "Job_Salary_Classification_Local"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
    
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
    
      - name: Check Environment
        run: |
          echo "CSV_URL=$CSV_URL"
          echo "MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI"
          echo "MLFLOW_EXPERIMENT_NAME=$MLFLOW_EXPERIMENT_NAME"
    
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0
          pip install pandas scikit-learn numpy matplotlib seaborn

      - name: Check MLflow Version
        run: |
          python -c "import mlflow; print(mlflow.__version__)"
    
      - name: Clean MLflow Directory
        run: |
          rm -rf mlruns
          mkdir -p mlruns
    
      - name: Run MLflow Project
        working-directory: MLProject
        shell: bash -l {0}
        run: |
          mlflow run . \
            --env-manager local \
            --param-list data_path="JobDataset_preprocessing/job_dataset_preprocessed.csv"
    
      - name: Get Latest MLflow Information
        run: |
          python << 'PY'
          import os
          import mlflow
    
          mlflow.set_tracking_uri(
              os.environ["MLFLOW_TRACKING_URI"]
          )
    
          exp = mlflow.get_experiment_by_name(
              os.environ["MLFLOW_EXPERIMENT_NAME"]
          )
    
          if exp is None:
              raise SystemExit(
                  "Experiment not found"
              )
    
          runs = mlflow.search_runs(
              experiment_ids=[exp.experiment_id],
              order_by=[
                  "attributes.start_time DESC"
              ],
              max_results=1
          )
    
          if runs.empty:
              raise SystemExit(
                  "No MLflow runs found"
              )
    
          run_id = runs.iloc[0]["run_id"]
    
          with open(
              os.environ["GITHUB_ENV"],
              "a"
          ) as f:
    
              f.write(
                  f"RUN_ID={run_id}\n"
              )
    
              f.write(
                  f"EXPERIMENT_ID={exp.experiment_id}\n"
              )
    
          print("RUN_ID =", run_id)
          print(
              "EXPERIMENT_ID =",
              exp.experiment_id
          )
          PY
    
      - name: Debug MLflow Structure
        run: |
          echo "RUN_ID=$RUN_ID"
          echo "EXPERIMENT_ID=$EXPERIMENT_ID"
    
          echo "===== MLRUNS STRUCTURE ====="
          find mlruns | sort
    
      - name: Show MLmodel Files
        run: |
          echo "===== MLMODEL FILES ====="
          find mlruns -name MLmodel
    
      - name: Upload MLruns To GitHub
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
    
          git add mlruns || true
    
          git commit -m "Add MLflow artifacts [skip ci]" || true
    
          git push origin main || true
    
      - name: Build Docker Model
        run: |
          MODEL_PATH="mlruns/$EXPERIMENT_ID/$RUN_ID/artifacts/model"
    
          echo "MODEL_PATH=$MODEL_PATH"
    
          ls -R "$MODEL_PATH"
    
          mlflow models build-docker \
            --model-uri "$MODEL_PATH" \
            --name salary-prediction-model
    
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
      - name: Tag Docker Image
        run: |
          docker tag \
          salary-prediction-model \
          ${{ secrets.DOCKER_HUB_USERNAME }}/salary-prediction-model:latest
    
      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_HUB_USERNAME }}/salary-prediction-model:latest
